<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASSWORD MANAGER - VIP BLUE</title>
    <style>
        /* Base font increase by 15% */
        html { font-size: 115%; }

        :root { 
            --blue: #00d2ff; 
            --deep-blue: #3a7bd5; 
            --obsidian: #020617; 
            --slate: #0f172a; 
            --text: #f1f5f9; 
        }

        body { 
            /* REPLACE 'YOUR_GITHUB_RAW_URL' WITH YOUR PNG LINK */
            background: 
                linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                url('YOUR_GITHUB_RAW_URL');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            background-color: var(--obsidian); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        
        .container { 
            width: 100%; 
            max-width: 1000px; 
            background: rgba(15, 23, 42, 0.9); /* Glass effect */
            backdrop-filter: blur(10px);
            border: 1px solid var(--deep-blue); 
            border-radius: 12px; 
            padding: 40px;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.15); 
            align-self: center;
        }

        h2 { 
            color: var(--blue); 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 30px; 
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            font-size: 1.8rem; /* Scaled */
        }
        
        .form-box { max-width: 350px; margin: 0 auto; text-align: center; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            background: #000; 
            border: 1px solid #1e293b; 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box;
            font-size: 1rem; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(45deg, var(--deep-blue), var(--blue)); 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase; 
            transition: 0.3s;
            font-size: 0.95rem;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        .link-btn { 
            background: none; 
            color: #94a3b8; 
            font-size: 0.85rem; 
            border: none; 
            cursor: pointer; 
            margin-top: 15px; 
            text-decoration: underline; 
        }

        /* DASHBOARD SECTION */
        #dashboard, #change-pass-box { display: none; }
        
        .role-badge { 
            display: inline-block; 
            padding: 6px 18px; 
            background: var(--blue); 
            color: #000; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 0.8rem; 
            margin-bottom: 20px; 
            text-transform: uppercase;
        }
        
        .table-container { 
            overflow-x: auto; 
            margin-top: 20px; 
            border-radius: 8px; 
            border: 1px solid #1e293b; 
        }
        
        table { width: 100%; border-collapse: collapse; min-width: 750px; }
        
        th { 
            background: #000; 
            color: var(--blue); 
            padding: 18px; 
            text-align: left; 
            font-size: 0.85rem; 
            text-transform: uppercase;
        }
        
        td { padding: 18px; border-bottom: 1px solid #1e293b; font-size: 0.95rem; }
        
        .ip-addr { color: var(--blue); font-family: 'Courier New', monospace; font-weight: bold; }
        .pass-chip { 
            background: #000; 
            padding: 5px 10px; 
            border: 1px solid #1e293b; 
            color: #38bdf8; 
            border-radius: 4px; 
            font-family: monospace; 
        }
        
        .logout-btn { 
            background: #1e293b; 
            color: #fff; 
            width: auto; 
            padding: 12px 30px; 
            margin-top: 35px; 
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="form-box">
        <h2>PASSWORD MANAGER</h2>
        <input type="text" id="uid" placeholder="USER ID">
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="handleAction('login')">LOGIN</button>
        <button class="link-btn" onclick="toggleForm('change')">Change Password?</button>
        <p id="status-msg" style="color: #38bdf8; margin-top: 20px; font-size: 0.9rem;"></p>
    </div>

    <div id="change-pass-box" class="form-box">
        <h2>UPDATE KEY</h2>
        <input type="text" id="c-uid" placeholder="USER ID">
        <input type="password" id="c-old" placeholder="CURRENT PASSWORD">
        <input type="password" id="c-new" placeholder="NEW PASSWORD">
        <button onclick="handleAction('change')">Update Password</button>
        <button class="link-btn" onclick="toggleForm('login')">Back to Login</button>
    </div>

    <div id="dashboard">
        <div style="text-align: center;">
            <div class="role-badge" id="badge">ROLE: PENDING</div>
            <h2>PASSWORD MANAGER</h2>
        </div>
        <div class="table-container">
            <table>
                <thead><tr id="thead-row"></tr></thead>
                <tbody id="tbody-rows"></tbody>
            </table>
        </div>
        <button class="logout-btn" onclick="location.reload()">LOGOUT TERMINAL</button>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbw4q7prw5zBMlnQpjYktQtXVGmZ0Izi2K0gzPYQDq5Lf2pEH-t2JmqbiahvQtgs-TEh/exec";

    function toggleForm(type) {
        document.getElementById('login-section').style.display = (type === 'login') ? 'block' : 'none';
        document.getElementById('change-pass-box').style.display = (type === 'change') ? 'block' : 'none';
        document.getElementById('status-msg').innerText = "";
    }

    async function handleAction(mode) {
        let url = `${APP_URL}?mode=${mode}`;
        const status = document.getElementById('status-msg');
        
        if(mode === 'login') {
            const u = document.getElementById('uid').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return;
            url += `&uid=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`;
        } else {
            const u = document.getElementById('c-uid').value;
            const op = document.getElementById('c-old').value;
            const np = document.getElementById('c-new').value;
            if(!u || !op || !np) return;
            url += `&uid=${encodeURIComponent(u)}&pass=${encodeURIComponent(op)}&newpass=${encodeURIComponent(np)}`;
        }

        status.innerText = "Connecting to Cyber-Sheet...";

        try {
            const response = await fetch(url);
            const result = await response.json();

            if (result.error) {
                status.style.color = "#ff4444";
                status.innerText = result.error;
                if(mode === 'change') alert(result.error);
            } else {
                if(mode === 'change') {
                    alert("Success: " + result.msg);
                    toggleForm('login');
                } else {
                    renderDashboard(result);
                }
            }
        } catch (err) {
            status.innerText = "Connection Failed: Check script deployment.";
        }
    }

    function renderDashboard(data) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('badge').innerText = "ACCESS LEVEL: " + data.role;
        
        const thead = document.getElementById('thead-row');
        const tbody = document.getElementById('tbody-rows');
        thead.innerHTML = ""; tbody.innerHTML = "";

        data.headers.forEach(h => thead.innerHTML += `<th>${h}</th>`);
        data.rows.forEach(r => {
            tbody.innerHTML += `
                <tr>
                    <td style="font-weight:bold; color:var(--blue)">${r[0]}</td>
                    <td>${r[1]}</td>
                    <td><span class="pass-chip">${r[2]}</span></td>
                    <td class="ip-addr">${r[3]}</td>
                    <td>${r[4]}</td>
                </tr>`;
        });
    }
</script>
</body>
</html>
